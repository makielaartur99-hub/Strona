<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dla Ciebie ✨</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
        }
        
        body { 
            background: #0a0512; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
            overflow: hidden; 
            position: relative; 
        }
        
        /* Kontener serca z wymuszeniem pracy karty graficznej (GPU) */
        .bg-heart { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%) translateZ(0); /* translateZ(0) uruchamia tryb 3D/GPU */
            width: 85vw; 
            max-width: 500px; 
            height: auto; 
            z-index: 1; 
            pointer-events: none; 
            
            /* Informujemy przeglądarkę telefonu, co się zmieni, by przygotowała na to pamięć RAM */
            will-change: transform, opacity; 
        }
        
        .bg-heart path { 
            stroke: #ff4b91; 
            stroke-width: 2; 
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: rgba(255, 75, 145, 0); 
            
            stroke-dasharray: 1; 
            stroke-dashoffset: 1; 
            
            /* Usunęliśmy stąd ciężki filtr. Teraz animacja robi tylko to, co lekkie */
            animation: drawAndFill 4s cubic-bezier(0.4, 0, 0.2, 1) forwards; 
        }
        
        /* OPTYMALIZACJA ANIMACJI: Zero zmian pikseli filtra w trakcie ruchu */
        @keyframes drawAndFill {
            0% {
                stroke-dashoffset: 1;
                fill: rgba(255, 75, 145, 0);
            }
            50% { 
                stroke-dashoffset: 0; 
                fill: rgba(255, 75, 145, 0);
            }
            100% { 
                stroke-dashoffset: 0; 
                fill: rgba(255, 75, 145, 0.22); 
                
                /* Filtr włączamy DOPIERO w ostatniej klatce (w 100%), 
                   dzięki czemu telefon nie musi go przeliczać klatka po klatce */
                filter: drop-shadow(0 0 25px rgba(255, 75, 145, 0.85)); 
            }
        }

        /* Szklana karta (Glassmorphism) - również zoptymalizowana pod GPU */
        .card { 
            background: rgba(255, 255, 255, 0.04); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 75, 145, 0.25); 
            padding: 45px 30px; 
            border-radius: 32px; 
            text-align: center; 
            width: 100%; 
            max-width: 420px; 
            z-index: 2; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); 
            
            /* Przesunięcie realizowane przez GPU za pomocą transform */
            transform: translateZ(0);
            will-change: transform, opacity;
            animation: fadeIn 1s ease 3.8s backwards; 
        }
        
        h1 { 
            color: #ff4b91; 
            font-size: 2rem; 
            margin-bottom: 20px; 
            text-shadow: 0 0 15px rgba(255, 75, 145, 0.4); 
            letter-spacing: 1px;
        }
        
        p { 
            color: #f3e8ee; 
            font-size: 1.05rem; 
            line-height: 1.6; 
            margin-bottom: 30px; 
        }
        
        a { 
            color: rgba(255,255,255,0.5); 
            text-decoration: none; 
            font-size: 0.9rem; 
            transition: all 0.3s; 
            border-bottom: 1px dashed rgba(255,255,255,0.3); 
            padding-bottom: 3px; 
        }
        
        a:hover { 
            color: #ff4b91; 
            border-color: #ff4b91; 
            text-shadow: 0 0 10px rgba(255, 75, 145, 0.5);
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(15px) translateZ(0); } 
            to { opacity: 1; transform: translateY(0) translateZ(0); } 
        }
    </style>
</head>
<body>

    <svg class="bg-heart" viewBox="0 0 100 100">
        <path pathLength="1" d="M 50,35 C 50,35 60,15 80,15 C 100,15 100,50 80,70 L 50,95 L 20,70 C 0,50 0,15 20,15 C 40,15 50,35 50,35 Z"/>
    </svg>

    <div class="card">
        <h1>Dla Ciebie ✨</h1>
        <p>Hej! Chciałem Ci po prostu podziękować, że jesteś. Ta podstrona i to serducho w tle powstały specjalnie z myślą o Tobie. Mam nadzieję, że wywołało uśmiech na Twojej twarzy! Miłego dnia!</p>
        <a href="../index.html">Wróć do portalu</a>
    </div>

</body>
</html>
