<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tajny Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-card">
        <h2>WPROWADŹ KOD</h2>
        <p class="subtitle">System bezpiecznej weryfikacji</p>
        <div class="input-group">
            <input type="text" id="secretCode" placeholder="Wpisz swój tajny kod..." autocomplete="off">
            <button onclick="checkCode()">Autoryzuj dostęp</button>
        </div>
        <div id="messageBox" class="message-box hidden">
            <p id="secretMessage"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
